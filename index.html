<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickii Bar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f3d6df;
            text-align: center;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            width: 90%;
            margin: auto;
        }
        .card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .logo { width: 120px; height: auto; margin-bottom: 15px; }
        .step-img { width: 200px; height: auto; margin-bottom: 20px; border-radius: 15px; }
        button {
            padding: 12px 25px; border: none; border-radius: 25px;
            font-size: 16px; cursor: pointer; margin: 8px; transition: 0.3s;
        }
        .next { background: #d3367e; color: white; }
        .back { background: #4b3f8f; color: white; }
        .finish { background: #28a745; color: white; }
        .hidden { display: none; }
        .choice {
            display: block; width: 100%; background: #d3367e;
            color: white; margin: 12px 0; font-weight: bold;
        }
        h2 { color: #4b3f8f; }
        p { color: #666; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div id="start">
            <img src="logo.png" alt="Logo" class="logo">
            <h2>✨ Stickii Bar</h2>
            <p>مرحباً بك في تجربة الطباعة<br>سأكون معك خطوة بخطوة</p>
            <button class="choice" onclick="startFabric()">الطباعة على القماش</button>
            <button class="choice" onclick="startCup()">الطباعة على الأكواب</button>
        </div>

        <div id="stepArea" class="hidden">
            <img id="stepImage" class="step-img" src="">
            <h3 id="stepText"></h3>
            <div id="buttonsContainer">
                <button id="backBtn" class="back" onclick="prev()">السابق</button>
                <button id="nextBtn" class="next" onclick="next()">التالي</button>
            </div>
        </div>

        <div id="congrats" class="hidden">
            <h2 style="font-size: 40px;">🎉</h2>
            <h3>تهانينا!</h3>
            <p>استمتع بقطعتك المميزة</p>
            <button class="back" onclick="reset()">العودة للرئيسية</button>
        </div>
    </div>
</div>

<script>
    let steps = [];
    let step = 0;

    function startFabric() {
        steps = [
            ["1. اختر الاستكرات", "1.png"],
            ["2. ضع الباوتش على الحصيرة", "2.png"],
            ["3. رتب الاستكرات", "3.png"],
            ["4. ضع ورق الحماية", "4.png"],
            ["5. اضغط بالمكبس الحراري", "5.png"],
            ["6. انتظر حتى يبرد", "6.png"],
            ["7. أزل الطبقة الشفافة", "7.png"]
        ];
        startSteps();
    }

    function startCup() {
        steps = [
            ["1. اختر الاستكر", "c1.png"],
            ["2. ضع الاستكر واضغط عليه جيداً", "c2.png"],
            ["3. أزل الطبقة الشفافة", "c3.png"]
        ];
        startSteps();
    }

    function startSteps() {
        step = 0;
        document.getElementById("start").style.display = "none";
        document.getElementById("congrats").classList.add("hidden");
        document.getElementById("stepArea").classList.remove("hidden");
        show();
    }

    function show() {
        document.getElementById("stepText").innerText = steps[step][0];
        document.getElementById("stepImage").src = steps[step][1];

        if (step > 0) {
            document.getElementById("backBtn").classList.remove("hidden");
        } else {
            document.getElementById("backBtn").classList.add("hidden");
        }

        let nextBtn = document.getElementById("nextBtn");
        if (step === steps.length - 1) {
            nextBtn.innerText = "النهاية";
            nextBtn.className = "finish";
        } else {
            nextBtn.innerText = "التالي";
            nextBtn.className = "next";
        }
    }

    function next() {
        if (step < steps.length - 1) {
            step++;
            show();
        } else {
            finishExperience();
        }
    }

    function prev() {
        if (step > 0) {
            step--;
            show();
        }
    }

    function finishExperience() {
        document.getElementById("stepArea").classList.add("hidden");
        document.getElementById("congrats").classList.remove("hidden");
    }

    function reset() {
        document.getElementById("congrats").classList.add("hidden");
        document.getElementById("start").style.display = "block";
    }
</script>
</body>
</html>
